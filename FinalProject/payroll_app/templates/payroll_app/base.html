{% load static %}
<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Shemu Payroll System{% endblock %}</title>

<link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Roboto:300,400,500,700|Material+Icons">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="{% static 'Payroll_App/css/baseCSS.css' %}">

<style>
    body {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
    }

    /* Lilac theme */
    .bg-lilac {
        background-color: #c8a2c8;
    }

    /* Navbar links */
    .navbar a {
        color: white !important;
        margin-right: 15px;
        text-decoration: none;
    }

    .navbar a:hover {
        text-decoration: underline;
    }
</style>

</head>

<body>

<!-- header & navbar -->
<nav class="navbar navbar-expand-lg bg-lilac sticky-top">
    <div class="container-fluid">
        <a class="navbar-brand text-white fw-bold" href="#">
            SHEMU Payroll
        </a>

    <div>
        <a href="{% url 'employees' %}">Employees</a>
        <a href="{% url 'payslips' %}">Payslips</a>
    </div>
</div>

</nav>

<!-- main content inserted here -->
<div class="flex-grow-1 container mt-4">

{% block heading %}{% endblock %}

{% block content %}
{% endblock %}

</div>

<!-- footer -->
<footer class="bg-lilac text-white text-center p-2 mt-auto">
    © 2026 
</footer>

</body>
</html>
