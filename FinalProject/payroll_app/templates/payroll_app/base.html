{% load static %}
<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Shemu Payroll{% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- css styling instructions -->
    <style>
        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background: #f5f5f5;
        }

        /* header */
        .header {
            background: linear-gradient(to right, #5a2e5a, #3d1f3d);
            padding: 20px 40px;
        }

        /* logo container */
        .logo {
            display: flex;
            gap: 5px;
        }

        /* for each letter */
        .logo span {
            font-size: 50px;
            font-weight: 900;
            line-height: 1;

            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;

            background-size: cover;
            background-position: center;
        }

        /* image for each letter and tint */
        .s {
            background-image:
                linear-gradient(rgba(255,255,255,0.5), rgba(255,255,255,0.4)),
                url("https://i.pinimg.com/736x/30/e8/24/30e82442400fe2410b52daebd28a3bf9.jpg");
        }

        .h {
            background-image:
                linear-gradient(rgba(255,255,255,0.5), rgba(255,255,255,0.4)),
                url("https://i.pinimg.com/736x/71/b5/b4/71b5b47c51b3d73496c0fe675cfd3995.jpg");
        }

        .e {
            background-image:
                linear-gradient(rgba(255,255,255,0.5), rgba(255,255,255,0.4)),
                url("https://i.pinimg.com/1200x/d2/97/b5/d297b5d28d74c9613b166e0399506c33.jpg");
        }

        .m {
            background-image:
                linear-gradient(rgba(255,255,255,0.5), rgba(255,255,255,0.4)),
                url("https://i.pinimg.com/736x/50/c9/ec/50c9ec632080e099cb26991fa2a5b500.jpg");
        }

        .u {
            background-image:
                linear-gradient(rgba(255,255,255,0.5), rgba(255,255,255,0.4)),
                url("https://i.pinimg.com/736x/e6/cb/81/e6cb81a10c84aef82178233efa52e232.jpg");
        }

        /* "payroll system" part of logo */
        .subtitle {
            color: white;
            font-size: 15px;
            font-weight: bold;
            letter-spacing: 3px;
            margin-top: -5px;
        }

        /* navigation */
        .nav-links a {
            color: white;
            margin-left: 20px;
            text-decoration: none;
            font-weight: 500;
        }

        .nav-links a:hover {
            text-decoration: underline;
        }

        /* content */
        .content {
            flex: 1;
            padding: 30px;
        }

        /* footer */
        footer {
            background-color: #5a2e5a; 
            color: white;
            text-align: center;
            padding: 10px;
        }
    </style>
</head>

<body>

<!-- header -->
<div class="header d-flex justify-content-between align-items-center">

    <!-- shemu logo -->
    <div>
        <div class="logo">
            <span class="s">S</span>
            <span class="h">H</span>
            <span class="e">E</span>
            <span class="m">M</span>
            <span class="u">U</span>
        </div>
        <div class="subtitle">Payroll System</div>
    </div>

    <!-- employee and playslip -->
    <div class="nav-links">
        <a href="#">Employees</a>
        <a href="#">Payslips</a>
    </div>

</div>

<!-- insert main content here -->
<div class="content container">
    {% block heading %}{% endblock %}
    {% block content %}{% endblock %}
</div>

<!-- footer -->
<footer>
    © 2026
</footer>

</body>
</html>
