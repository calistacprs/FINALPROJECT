{% load static %}
<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Shemu Payroll{% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background: #f5f5f5;
        }

        /* header */
        .header {
            position: relative;
            background: radial-gradient(circle at top, #5b3a8a, #2e1a47 75%);
            padding: 20px 40px;
            overflow: hidden;
        }

        /* subtle JB overlay */
        .header::before {
            content: "";
            position: absolute;
            inset: 0;

            background: url("https://images.genius.com/cff977262de4bf712a530580d27c7412.1000x1000x1.jpg");
            background-size: cover;
            background-position: center;

            opacity: 0.2; 
            filter: grayscale(100%) contrast(130%) brightness(80%);
            mix-blend-mode: overlay;
        }

        /* soft glow layer */
        .header::after {
            content: "";
            position: absolute;
            inset: 0;
            background: radial-gradient(circle, rgba(255,255,255,0.05), transparent);
        }

        /* keep content above overlay */
        .header > * {
            position: relative;
            z-index: 1;
        }

        /* logo container */
        .logo {
            display: flex;
            gap: 2px;
            text-shadow: 0 0 6px rgba(255, 154, 213, 0.3);
        }

        /* letters */
        .logo span {
            font-size: 50px;
            font-weight: 900;
            letter-spacing: 3px;
            line-height: 1;

            background: linear-gradient(45deg, #ff9ad5, #c084fc, #7dd3fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* subtitle */
        .subtitle {
            color: #e9d5ff;
            font-size: 13px;
            letter-spacing: 4px;
            margin-left: 6px;
            opacity: 0.8;
            transform: translateY(5px);
        }

        /* navigation */
        .nav-links a {
            color: #f5d0fe;
            margin-left: 20px;
            text-decoration: none;
            font-weight: 500;
            transition: 0.2s ease;
        }

        .nav-links a:hover {
            text-decoration: underline;
            color: white;
        }

        /* content */
        .content {
            flex: 1;
            padding: 30px;
        }

        /* footer */
        footer {
            background-color: #3b0764;
            color: #e9d5ff;
            text-align: center;
            padding: 10px;
        }
    </style>
</head>

<body>

<!-- header -->
<div class="header d-flex justify-content-between align-items-center">

    <!-- shemu logo -->
    <div class="d-flex align-items-center">
        <div class="logo">
            <span>S</span>
            <span>H</span>
            <span>E</span>
            <span>M</span>
            <span>U</span>
        </div>
        <div class="subtitle">PAYROLL</div>
    </div>

    <!-- navigation -->
    <div class="nav-links">
        <a href="#">Employees</a>
        <a href="#">Payslips</a>
    </div>

</div>

<!-- content -->
<div class="content container">
    {% block heading %}{% endblock %}
    {% block content %}{% endblock %}
</div>

<!-- footer -->
<footer>
    © 2026
</footer>

</body>
</html>
