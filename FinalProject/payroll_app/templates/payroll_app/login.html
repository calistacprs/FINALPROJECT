{% extends "payroll_app/base.html" %}
{% load static %}
{% block content %}
<style>
    body {
        background-image: url("{% static 'JB_BG.png' %}");
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        min-height: 100vh;
    }

    .login-card {
        background-color: rgba(157, 137, 184, 0.495);
    }

    .carousel-img {
        width: 50%;
        height: 350px;
    }
</style>

<div class="container mt-5">

    <div class="text-center mb-4">
        <h2 class="fw-bold text-white">Login</h2>
    </div>

    <div class="row justify-content-center">
        <div class="col-lg-5 col-md-7">

            <div class="card shadow-sm border-0 rounded-3 login-card">
                <div class="card-body p-4">

                    {% if message %}
                        <div class="alert alert-dark">
                            {{ message }}
                        </div>
                    {% endif %}

                    <form method="POST">
                        {% csrf_token %}

                        <div class="mb-3">
                            <label class="form-label fw-semibold text-white">Username</label>
                            <input type="text" name="username" class="form-control" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-semibold text-white">Password</label>
                            <input type="password" name="password" class="form-control" required>
                        </div>

                        <div class="d-grid mb-3">
                            <button type="submit" class="btn btn-dark">Login</button>
                        </div>

                        <div class="d-grid mb-3">
                            <a href="{% url 'signup' %}" class="btn btn-dark">Sign up</a>
                        </div>

                    </form>
                    
                    <!-- JB pictures baby -->
                            <div id="JBslides" class="carousel slide" data-bs-ride="carousel" data-bs-interval="3000">

                                <div class="carousel-indicators">
                                    <button type="button" data-bs-target="#JBslides" data-bs-slide-to="0" class="active"></button>
                                    <button type="button" data-bs-target="#JBslides" data-bs-slide-to="1"></button>
                                    <button type="button" data-bs-target="#JBslides" data-bs-slide-to="2"></button>
                                </div>

                                <div class="carousel-inner">

                                    <div class="carousel-item active">
                                        <img src="{% static 'JB1.png' %}" class="d-block carousel-img mx-auto" alt="...">
                                    </div>

                                    <div class="carousel-item">
                                        <img src="{% static 'JB2.png' %}" class="d-block carousel-img mx-auto" alt="...">
                                    </div>

                                    <div class="carousel-item">
                                        <img src="{% static 'JB3.png' %}" class="d-block carousel-img mx-auto" alt="...">
                                    </div>

                                </div>

                            </div>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>

</div>

{% endblock %}
