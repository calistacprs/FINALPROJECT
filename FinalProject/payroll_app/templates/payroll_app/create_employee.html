{% extends "payroll_app/base.html" %}
{% load static %}
{% block content %}

<style>
    body {
        background-image: url("{% static 'JB_BG.png' %}");
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        min-height: 100vh;
    }

    .glow-text {
        color: #fff;
        text-shadow: 
            0 0 2px rgba(255, 255, 255, 0.8),
            0 0 4px rgba(255, 255, 255, 0.6),
            0 0 6px rgba(255, 255, 255, 0.4);
    }
</style>

<!-- audio -->
<audio id="bg-music" loop>
    <source src="{% static 'music.mp3' %}" type="audio/mpeg">
</audio>
<!-- audio -->

<div class="container mt-2">

<div class="text-center mb-4">
    <h2 class="fw-bold text-white glow-text">Create Employee</h2>
</div>

<div class="row justify-content-center">
    <div class="col-lg-6 col-md-8">

        <div class="card shadow-sm border-0 rounded-3">
            <div class="card-body p-4">

                {% if messages %}
                    {% for message in messages %}
                        <div class="alert alert-danger">
                            {{ message }}
                        </div>
                    {% endfor %}
                {% endif %}

                <!-- added onsubmit for audio -->
                <form method="POST" onsubmit="fadeOutMusic()">
                    {% csrf_token %}

                    <div class="mb-3">
                        <label class="form-label fw-semibold">Name</label>
                        <input type="text" name="name" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-semibold">ID Number</label>
                        <input type="number" name="id_number" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-semibold">Rate</label>
                        <input type="number" step="0.01" min="0" name="rate" class="form-control" required>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-semibold">Allowance (Optional)</label>
                        <input type="number" step="0.01" min="0" name="allowance" class="form-control">
                    </div>

                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-dark">
                            Submit
                        </button>

                        <a href="{% url 'employees' %}" class="btn btn-outline-secondary">
                            Cancel
                        </a>
                    </div>

                </form>

            </div>
        </div>

    </div>
</div>

</div>

<!-- code for music -->
<script>
let hasPlayed = false;

// play music on first click anywhere
document.addEventListener("click", function () {
    if (!hasPlayed) {
        const music = document.getElementById("bg-music");
        music.volume = 0.5; 
        music.play();
        hasPlayed = true;
    }
}, { once: true });

// fade out before submitting
function fadeOutMusic() {
    const music = document.getElementById("bg-music");
    if (!music) return;

    let fade = setInterval(() => {
        if (music.volume > 0.05) {
            music.volume -= 0.05;
        } else {
            music.pause();
            music.currentTime = 0;
            clearInterval(fade);
        }
    }, 100);
}
</script>

{% endblock %}
