{% extends "payroll_app/base.html" %}
{% load static %}
{% block content %}
<style>
    body {
    background-image: url("{% static 'JB_BG.png' %}");
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    min-height: 100vh;
}

    .login-card {
        background-color: rgba(90, 61, 127, 0.6);
    }

    .glow-text {
        color: #fff;
        text-shadow: 
            0 0 2px rgba(255, 255, 255, 0.8),
            0 0 4px rgba(255, 255, 255, 0.6),
            0 0 6px rgba(255, 255, 255, 0.4);
    }
</style>

<div class="container mt-5">

    <div class="text-center mb-4">
        <h2 class="fw-bold text-white glow-text">Change Password</h2>
    </div>

    <div class="row justify-content-center">
        <div class="col-lg-5 col-md-7">

            <div class="card shadow-sm border-0 rounded-3 login-card">
                <div class="card-body p-4">

                    {% if display %}
                        <div class="alert alert-danger">
                            {{ display }}
                        </div>
                    {% endif %}

                    <form method="POST">
                        {% csrf_token %}

                        <div class="mb-3">
                            <label class="form-label fw-semibold text-white">Current Password</label>
                            <input type="password" name="current_password" class="form-control" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-semibold text-white">New Password</label>
                            <input type="password" name="new_password" class="form-control" required>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-semibold text-white">Confirm Password</label>
                            <input type="password" name="confirm_password" class="form-control" required>
                        </div>

                        <div class="d-grid gap-3">
                            <button type="submit" class="btn btn-dark">
                                Update Password
                            </button>

                            <a href="{% url 'manage_account' account.pk %}" class="btn btn-outline-secondary text-white">
                                Cancel
                            </a>
                        </div>

                    </form>

                </div>
            </div>

        </div>
    </div>

</div>

{% endblock %}
